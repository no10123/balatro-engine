<!DOCTYPE html>
<html>
<head>
    <title>Balatro Engine Host</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; color: white; font-family: monospace; }
        canvas { display: block; margin: 0 auto; height: 100vh; }
        #debug-console { position: absolute; top: 0; left: 0; width: 100%; height: 30%; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 10px; box-sizing: border-box; z-index: 999; border-bottom: 2px solid #444; pointer-events: none; text-shadow: 1px 1px 0 #000; }
        .err { color: #ff5555; font-weight: bold; }
        .warn { color: #ffff55; }
        .good { color: #55ff55; }
    </style>
</head>
<body>
    <div id="debug-console">--- Balatro Web Console ---<br></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        const debugDiv = document.getElementById('debug-console');
        function logToScreen(msg, type = '') {
            const span = document.createElement('span');
            span.className = type;
            span.innerText = msg + '\n';
            debugDiv.appendChild(span);
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        window.onerror = function(msg) { logToScreen('GLOBAL ERROR: ' + msg, 'err'); };

        // State variables to handle timing
        let engineReady = false;
        let pendingBlob = null;

        var Module = { 
            canvas: document.getElementById('canvas'),
            noInitialRun: true,
            print: function(text) { logToScreen(text); },
            printErr: function(text) { logToScreen(text, 'err'); },
            onRuntimeInitialized: function() { 
                logToScreen("WASM Engine initialized. Ready to play!", "good"); 
                engineReady = true;
                // If a file was sent while we were booting, play it now!
                if (pendingBlob) {
                    processGameFile(pendingBlob);
                    pendingBlob = null;
                }
            }
        };

        function processGameFile(blob) {
            logToScreen("Writing file to virtual memory...");
            blob.arrayBuffer().then(buffer => {
                let data = new Uint8Array(buffer);
                try {
                    // Try to use Module.FS, fallback to global FS
                    let fileSystem = Module.FS || FS;
                    fileSystem.writeFile('game.love', data);
                    logToScreen("File saved! Pressing Play...", "good");
                    Module.callMain(['game.love']);
                } catch(e) {
                    logToScreen("CRITICAL BOOT ERROR: " + e.message, 'err');
                }
            }).catch(e => logToScreen("BUFFER ERROR: " + e.message, 'err'));
        }

        // Boot the engine script
        logToScreen("Booting engine script...");
        let script = document.createElement('script');
        script.src = "love.js";
        document.body.appendChild(script);

        // Listen for the Pitcher
        window.addEventListener("message", function(event) {
            if (event.data instanceof Blob) {
                logToScreen("Received game blob from local patcher!", "good");
                
                if (engineReady) {
                    processGameFile(event.data);
                } else {
                    logToScreen("Engine is still booting. Queuing file...", "warn");
                    pendingBlob = event.data;
                }
            }
        });
    </script>
</body>
</html>
