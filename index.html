<!DOCTYPE html>
<html>
<head>
    <title>Balatro Engine Host</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; color: white; font-family: monospace; }
        canvas { display: block; margin: 0 auto; height: 100vh; }
        #debug-console { position: absolute; top: 0; left: 0; width: 100%; height: 30%; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 10px; box-sizing: border-box; z-index: 999; border-bottom: 2px solid #444; pointer-events: none; text-shadow: 1px 1px 0 #000; }
        .err { color: #ff5555; font-weight: bold; }
        .warn { color: #ffff55; }
        .good { color: #55ff55; }
    </style>
</head>
<body>
    <div id="debug-console">--- Balatro Web Console ---<br></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        const debugDiv = document.getElementById('debug-console');
        function logToScreen(msg, type = '') {
            const span = document.createElement('span');
            span.className = type;
            span.innerText = msg + '\n';
            debugDiv.appendChild(span);
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        window.onerror = function(msg) { logToScreen('GLOBAL ERROR: ' + msg, 'err'); };

        var Module = { 
            canvas: document.getElementById('canvas'),
            noInitialRun: true,
            print: function(text) { logToScreen(text); },
            printErr: function(text) { logToScreen(text, 'err'); },
            onRuntimeInitialized: function() { 
                logToScreen("WASM Engine initialized. Waiting for blob...", "good"); 
            }
        };

        // --- THE FILE HEALTH CHECK ---
        async function checkFiles() {
            logToScreen("Running File Health Check...");
            
            try {
                // 1. Check love.js
                let jsRes = await fetch('love.js');
                if (!jsRes.ok) throw new Error("love.js missing! (Error " + jsRes.status + ")");
                let jsText = await jsRes.text();
                
                // If it starts with HTML, you downloaded a webpage!
                if (jsText.trim().startsWith("<!DOCTYPE html>")) {
                    logToScreen("CRITICAL ERROR: Your love.js is an HTML file! You fell for the 'Save As' trap.", "err");
                    return;
                }
                logToScreen("love.js looks good (" + Math.round(jsText.length/1024) + " KB).", "good");

                // 2. Check love.wasm
                let wasmRes = await fetch('love.wasm');
                if (!wasmRes.ok) throw new Error("love.wasm missing! (Error " + wasmRes.status + ")");
                let wasmBlob = await wasmRes.blob();
                
                // If it's suspiciously small, it's probably also an HTML file
                if (wasmBlob.size < 50000) { 
                    logToScreen("CRITICAL ERROR: Your love.wasm is too small (" + Math.round(wasmBlob.size/1024) + " KB). It is probably an HTML file in disguise.", "err");
                    return;
                }
                logToScreen("love.wasm looks good (" + Math.round(wasmBlob.size/1024) + " KB).", "good");

                // If health check passes, inject the engine
                logToScreen("Files verified. Booting engine...", "good");
                let script = document.createElement('script');
                script.src = "love.js";
                document.body.appendChild(script);

            } catch (e) {
                logToScreen("HEALTH CHECK FAILED: " + e.message, "err");
            }
        }
        
        checkFiles();

        window.addEventListener("message", function(event) {
            if (event.data instanceof Blob) {
                logToScreen("Received game blob from local patcher!", "good");
                event.data.arrayBuffer().then(buffer => {
                    let data = new Uint8Array(buffer);
                    FS.writeFile('game.love', data);
                    logToScreen("File saved to memory. Pressing Play...");
                    try {
                        Module.callMain(['game.love']);
                    } catch(e) {
                        logToScreen("CRITICAL BOOT ERROR: " + e.message, 'err');
                    }
                }).catch(e => logToScreen("BUFFER ERROR: " + e.message, 'err'));
            }
        });
    </script>
</body>
</html>
