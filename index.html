<!DOCTYPE html>
<html>
<head>
    <title>Balatro Engine Host</title>
    <style>body { margin: 0; background: black; overflow: hidden; }</style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="text/javascript">
        var Module = { canvas: document.getElementById('canvas') };

        // THE CATCHER LOGIC
        window.addEventListener("message", function(event) {
            // Check if we received a game file (Blob)
            if (event.data instanceof Blob) {
                console.log("Patch received! Starting game...");
                
                event.data.arrayBuffer().then(buffer => {
                    let data = new Uint8Array(buffer);
                    
                    // Write the file to the virtual filesystem
                    FS.writeFile('game.love', data);
                    
                    // Tell the engine to run the file we just received
                    Module.callMain(['game.love']);
                });
            }
        });
    </script>
    <script async type="text/javascript" src="love.js"></script>
</body>
</html>
